configuration:
  database:
    name: Database
    description: Name of the PostgreSQL database to create
  shared_buffers:
    name: Shared Buffers
    description: "PostgreSQL shared memory (RPi 5 4GB: 256MB, 8GB: 512MB)"
  work_mem:
    name: Work Memory
    description: Memory per sort/hash operation
  effective_cache_size:
    name: Effective Cache Size
    description: "Planner hint for OS cache size (RPi 5 4GB: 768MB, 8GB: 1536MB)"
  max_connections:
    name: Max Connections
    description: Maximum simultaneous database connections (HA typically uses 5-10)
  log_level:
    name: Log Level
    description: PostgreSQL log verbosity
  enable_jit:
    name: Enable JIT Compilation
    description: "Enable PostgreSQL LLVM JIT (Postgres default). Turn off if dashboard queries feel slow — the 1–3s compile cost rarely pays off on HA/Grafana workloads."
  ha_db_password:
    name: HA Database Password
    description: "Password for the 'homeassistant' role (leave empty to auto-generate)"
  enable_readonly:
    name: Enable Read-Only Role
    description: "Create 'homeassistant_ro' role with read-only access (SELECT only)"
  readonly_password:
    name: Read-Only Password
    description: "Password for 'homeassistant_ro' (leave empty to auto-generate)"
  readonly_network:
    name: Read-Only Network
    description: "Network access for 'homeassistant_ro'. internal = HAOS apps only. external = any IP (also enable host port in Network tab)"
  enable_readwrite:
    name: Enable Read-Write Role
    description: "Create 'homeassistant_rw' role with read-write access (no DDL)"
  readwrite_password:
    name: Read-Write Password
    description: "Password for 'homeassistant_rw' (leave empty to auto-generate)"
  readwrite_network:
    name: Read-Write Network
    description: "Network access for 'homeassistant_rw'. internal = HAOS apps only. external = any IP (also enable host port in Network tab)"
  enable_admin:
    name: Enable Admin Access
    description: "Set password on 'postgres' superuser and allow remote access"
  admin_password:
    name: Admin Password
    description: "Password for 'postgres' superuser (leave empty to auto-generate)"
  admin_network:
    name: Admin Network
    description: "Network access for 'postgres'. internal = HAOS apps only. external = any IP (also enable host port in Network tab)"
  backup_enabled:
    name: Enable pgBackRest Backups
    description: "Enable dual-repo physical backups to two independent SFTP destinations. When off (default), PostgreSQL runs without WAL archiving and no pgBackRest code path executes. Requires repo1 SFTP fields below. See DOCS.md for setup."
  archive_timeout_seconds:
    name: Archive Timeout (seconds)
    description: "Force a WAL segment switch at least this often even on an idle database. Bounds maximum backup lag. Default 3600 (1 hour)."
  repo1_sftp_host:
    name: Repo1 SFTP Host
    description: "Hostname of the primary (rolling operational) backup SFTP target. Example: u123456.your-storagebox.de"
  repo1_sftp_port:
    name: Repo1 SFTP Port
    description: "SFTP port for repo1. Hetzner Storage Box uses 23; generic SSH is 22."
  repo1_sftp_user:
    name: Repo1 SFTP User
    description: "SFTP username for repo1. For Hetzner Storage Box, the sub-account user (e.g. u123456-sub1)."
  repo1_sftp_path:
    name: Repo1 SFTP Path
    description: "Remote path inside repo1 chroot for pgBackRest data. '/' when the SFTP account is already chrooted to a backup directory."
  repo2_sftp_host:
    name: Repo2 SFTP Host
    description: "Hostname of the archival (annual-forever) backup SFTP target. Fully independent of repo1 — may be a different provider. Leave empty if only repo1 is used."
  repo2_sftp_port:
    name: Repo2 SFTP Port
    description: "SFTP port for repo2."
  repo2_sftp_user:
    name: Repo2 SFTP User
    description: "SFTP username for repo2."
  repo2_sftp_path:
    name: Repo2 SFTP Path
    description: "Remote path inside repo2 chroot for pgBackRest data."
